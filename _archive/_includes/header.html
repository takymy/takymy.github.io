<header class="site-header">
    <div class="container header-inner">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.author.name }}</a>
        <nav class="site-nav">
            {% for item in site.data.nav %}
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
            {% endfor %}
        </nav>
    </div>
</header>
