<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Local CSS variables & base styles -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <div class="command-center-grid"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="logo" id="dynamic-logo">{{ site.author.name }}</a>
            
            <div class="desktop-nav-links desktop-only" style="display:flex; gap:2rem;">
                {% for item in site.data.nav %}
                <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
                {% endfor %}
            </div>

            <!-- Mobile Menu Trigger -->
            <div class="hamburger mobile-only">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
            
        <ul class="nav-links mobile-only" id="nav-menu">
            {% for item in site.data.nav %}
            <li><a href="{{ item.url | relative_url }}" class="btn btn-secondary">{{ item.title }}</a></li>
            {% endfor %}
        </ul>
    </nav>
