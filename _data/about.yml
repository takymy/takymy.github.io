headline: Mykyta Chursin
subheadline: Software Developer - Aspiring Security Engineer - AI Enthusiast
bio:
  - "Hi, I’m Mykyta Chursin. I’m currently studying Computer Science with Cybersecurity at the University of Southampton, working towards an MEng."
  - "I'm a software developer with a strong interest in building secure and scalable systems. I enjoy tackling complex technical challenges, mastering new technologies, and writing clean, efficient code."
  - "Outside of my studies and hobbies, I actively participate in hackathons (like my recent 2nd place at Soton Hack 2025) and continuously explore modern development frameworks to expand my skill set."
  - "Currently, I'm aiming for a career in Cyber Security, and I'm actively learning and developing my skills in this area. I'm particularly interested in penetration testing and vulnerability research."
  - "I’m always open to new opportunities and conversations, so feel free to reach out."
