- title: Office Network Cisco Packet Tracer Project
  description: Designed and simulated a secure, multi-department office network. Implemented IP addressing, subnetting and VLANs to segment traffic between departments. Configured core network services, including DHCP for dynamic IP allocation.
  tags: [Networking, Cisco, Packet Tracer]
  link: "#"

- title: Kribb
  description: Krib is a cross-platform app that streamlines the student accommodation search for students. It allows users to swipe left and right on properties (Tinder style, ADHD friednly), vote on their favorite properties and create groups with their flatmates to make decisions together. AI enquiry feature is available for users to get in touch with property owners.
  tags: [React Native, Expo]
  link: "https://github.com/takymy/kribb"

- title: IntiHealth
  description: A digital sexual health app that was developed by me and my coursemates as a part of my second year coursework for Software Design and Development module. The app is designed to provide users with information about sexual health and STIs. It also includes a feature to book appointments and see test results.
  tags: [Java, Coursework, OOP]
  link: "#"

- title: RDFLite
  description: RDFLite is a domain specific programming language for querying simple RDF documents. RDF - the Resource Description Framework - is a data model and syntax for describing graphs, and is the underlying technology used on the Semantic Web. Was developed by me and my coursemates as a part of Programming Language Concepts coursework.
  tags: [Haskell, Algorithms, Coursework]
  link: "https://github.com/takymy/RDFLite"

- title: MazeRunner
  description: A pathfinding program developed as part of my first-year University coursework. It implements a custom-written floodfill algorithm to navigate through complex, generated mazes to find the optimal path to the exit.
  tags: [Algorithms, Floodfill, Coursework]
  link: "https://github.com/takymy/UoS-Micromouse-Maze-Runner"

