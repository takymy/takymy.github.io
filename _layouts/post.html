---
layout: default
---

<section class="section framed-section" style="margin-top: 10rem;">
    <div class="framed-header" style="justify-content: space-between;">
        <span class="framed-title">Post</span>
        <a href="{{ '/blog' | relative_url }}" class="mono-subtext accent-green hover-white" style="margin-right: 1rem; text-decoration: none;">&larr; Back to index</a>
    </div>
    <div class="framed-content">
        <div>
            <header style="border-bottom: 2px solid var(--border-color); margin-bottom: 2rem; padding-bottom: 1rem;">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--accent-yellow);">{{ page.title }}</h1>
                <p class="mono-subtext accent-green">
                    DATE: {{ page.date | date: "%Y-%m-%d" }} // AUTHOR: Mykyta Chursin
                </p>
            </header>

            <article style="color: var(--text-secondary); line-height: 1.8; font-size: 1.1rem;" class="markdown-body">
                {{ content }}
            </article>
        </div>
    </div>
</section>

<style>
/* Essential Markdown Styling for the Post Content */
.markdown-body h2 { color: var(--text-primary); margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
.markdown-body h3 { color: var(--text-primary); margin-top: 2rem; margin-bottom: 0.8rem; }
.markdown-body p { margin-bottom: 1.5rem; }
.markdown-body a { color: var(--accent-blue); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; color: var(--text-primary); }
.markdown-body pre { background-color: var(--bg-dark); border: 1px solid var(--border-color); padding: 1rem; overflow-x: auto; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.9rem; }
.markdown-body code { font-family: var(--font-mono); background-color: var(--bg-dark); padding: 0.1rem 0.3rem; border: 1px solid var(--border-color); font-size: 0.9em; color: var(--accent-green); }
.markdown-body pre code { border: none; padding: 0; background-color: transparent; color: var(--text-secondary); }
.markdown-body ul, .markdown-body ol { margin-bottom: 1.5rem; padding-left: 2rem; }
.markdown-body li { margin-bottom: 0.5rem; }
</style>
